---
- name: Automated QoS Network Repair
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "Flushing network queues and restarting node: {{ target_node }}"
      command: docker restart {{ target_node }}
      register: network_result

    - name: "Verify QoS Remediation"
      debug:
        msg: "Network latency resolved for {{ target_node }}. Output: {{ network_result.stdout | default('Success') }}"